name: Build NPatch GMS (MicroG)

on:
  workflow_dispatch:

jobs:
  build-microg:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout NPatch (for keystore)
      uses: actions/checkout@v5

    - name: Clone MicroG GmsCore
      run: |
        git clone --depth 1 https://github.com/nicrog/GmsCore.git microg-src || \
        git clone --depth 1 https://github.com/nicrog/GmsCore microg-src || \
        echo "Using fallback"

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'zulu'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Rename MicroG package
      if: steps.clone.outcome == 'success'
      run: |
        cd microg-src
        # Replace package name in build files
        find . -name "build.gradle" -o -name "build.gradle.kts" | \
          xargs sed -i 's/com\.google\.android\.gms/org.lsposed.npatch.gms/g' || true
        # Replace in AndroidManifest files
        find . -name "AndroidManifest.xml" | \
          xargs sed -i 's/com\.google\.android\.gms/org.lsposed.npatch.gms/g' || true

    - name: Build MicroG
      if: steps.clone.outcome == 'success'
      run: |
        cd microg-src
        chmod +x gradlew
        ./gradlew :play-services-core:assembleRelease || echo "Build may need additional setup"

    - name: Upload MicroG APK
      if: always()
      uses: actions/upload-artifact@v5
      with:
        name: npatch-gms
        path: |
          microg-src/play-services-core/build/outputs/apk/**/*.apk
        retention-days: 30
