name: Export keystore (repassword)

on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Restore keystore from base64 secret
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ secrets.KEY_STORE }}" | base64 --decode > key.jks

      - name: Change keystore password (storepass)
        shell: bash
        env:
          OLD_STORE_PASS: ${{ secrets.KEY_STORE_PASSWORD }}
          NEW_STORE_PASS: ${{ secrets.NEW_KEY_STORE_PASSWORD }}
        run: |
          set -euo pipefail
          keytool -storepasswd \
            -keystore key.jks \
            -storepass "$OLD_STORE_PASS" \
            -new "$NEW_STORE_PASS"

      - name: Change key password (keypass)
        shell: bash
        env:
          ALIAS: ${{ secrets.ALIAS }}
          STORE_PASS: ${{ secrets.NEW_KEY_STORE_PASSWORD }}
          OLD_KEY_PASS: ${{ secrets.KEY_PASSWORD }}
          NEW_KEY_PASS: ${{ secrets.NEW_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          keytool -keypasswd \
            -keystore key.jks \
            -storepass "$STORE_PASS" \
            -alias "$ALIAS" \
            -keypass "$OLD_KEY_PASS" \
            -new "$NEW_KEY_PASS"

      - name: Verify keystore can be opened (no sensitive output)
        shell: bash
        env:
          STORE_PASS: ${{ secrets.NEW_KEY_STORE_PASSWORD }}
        run: |
          set -euo pipefail
          keytool -list -keystore key.jks -storepass "$STORE_PASS" > /dev/null

      - name: Upload keystore as artifact
        uses: actions/upload-artifact@v5
        with:
          name: release-keystore-jks
          path: key.jks
          retention-days: 1
