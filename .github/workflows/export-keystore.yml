name: Export Android signing keystore (repassword)

on:
  workflow_dispatch:

jobs:
  export:
    name: Export keystore with new passwords
    runs-on: ubuntu-latest

    steps:
      - name: Validate required secrets exist
        shell: bash
        run: |
          set -euo pipefail
          req=(
            "KEY_STORE"
            "KEY_STORE_PASSWORD"
            "ALIAS"
            "NEW_KEY_STORE_PASSWORD"
            "NEW_KEY_PASSWORD"
          )
          missing=0
          for k in "${req[@]}"; do
            # We can only test existence, not print values.
            if [[ -z "${{ secrets[k] }}" ]]; then
              echo "::error::Missing secret: $k"
              missing=1
            fi
          done
          exit "$missing"

      - name: Restore keystore (PKCS12) from base64 secret
        shell: bash
        run: |
          set -euo pipefail
          # Your KEY_STORE is base64; the content is actually PKCS12 (per your error).
          echo "${{ secrets.KEY_STORE }}" | base64 --decode > key.p12

      - name: Verify old keystore password works (no sensitive output)
        shell: bash
        env:
          OLD_STORE_PASS: ${{ secrets.KEY_STORE_PASSWORD }}
        run: |
          set -euo pipefail
          keytool -list \
            -keystore key.p12 \
            -storetype PKCS12 \
            -storepass "$OLD_STORE_PASS" > /dev/null

      - name: Convert PKCS12 -> JKS and set new passwords
        shell: bash
        env:
          ALIAS: ${{ secrets.ALIAS }}
          OLD_STORE_PASS: ${{ secrets.KEY_STORE_PASSWORD }}
          NEW_STORE_PASS: ${{ secrets.NEW_KEY_STORE_PASSWORD }}
          NEW_KEY_PASS: ${{ secrets.NEW_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          # Convert to a standard JKS keystore that Android/Gradle commonly uses.
          # This also lets you control the new storepass and keypass.
          keytool -importkeystore \
            -srckeystore key.p12 \
            -srcstoretype PKCS12 \
            -srcstorepass "$OLD_STORE_PASS" \
            -srcalias "$ALIAS" \
            -destkeystore key.jks \
            -deststoretype JKS \
            -deststorepass "$NEW_STORE_PASS" \
            -destkeypass "$NEW_KEY_PASS" \
            -noprompt

      - name: Verify new JKS password works (no sensitive output)
        shell: bash
        env:
          NEW_STORE_PASS: ${{ secrets.NEW_KEY_STORE_PASSWORD }}
        run: |
          set -euo pipefail
          keytool -list -keystore key.jks -storepass "$NEW_STORE_PASS" > /dev/null

      - name: Upload new JKS keystore as artifact (download this)
        uses: actions/upload-artifact@v5
        with:
          name: android-release-keystore-jks
          path: key.jks
          retention-days: 1

      - name: Cleanup
        if: always()
        shell: bash
        run: |
          rm -f key.p12 key.jks
